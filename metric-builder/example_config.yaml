version: "1.0"

data:
  tab_name: "Raw"
  start_cell: "A1"
  dimensions: [week, year, grain, node]
  metrics: [avg_metric, item_count]
  ranking_columns:
    rank_col: site_rank
    flag_col: is_top_20

periods:
  column: week
  header_format: "WK{value}"
  count: 6
  hidden_key_row: 1
  display_header_row: 2
  header_start_col: "C"

sections:
  - name: "Network Summary"
    type: rollup
    grain: network
    node: "Overall"
    target_row: 4
    metrics: [avg_metric]

  - name: "Top 20 Sites"
    type: ranked
    top_n: 20
    grain: site
    label_format: "{node} | {facility_type}"
    target_start_row: 16
    label_col: "B"
    key_col: "Z"
    metrics: [item_count]
    denominator:
      grain: network
      node: "Overall"
      metric: item_count
    formula_type: percentage
